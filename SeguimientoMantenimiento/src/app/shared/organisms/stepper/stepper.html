<div class="w-full flex flex-col gap-6 font-sans">

  <div class="flex items-center justify-between relative px-6 py-3 bg-white/[0.01] border border-white/5 rounded-xl backdrop-blur-md">
    @for (step of stepsConfig(); track step.value; let isLast = $last) {

      <div class="flex items-center gap-3 z-10 select-none">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center font-mono font-bold text-xs transition-all duration-300"
             [ngClass]="{
               'bg-blue-500 text-white shadow-[0_0_15px_rgba(59,130,246,0.4)] border border-blue-400/30': $index === currentStepIndex,
               'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20': $index < currentStepIndex,
               'bg-white/5 text-slate-500 border border-white/5': $index > currentStepIndex
             }">
          @if ($index < currentStepIndex) {
            <i class="pi pi-check text-[9px]"></i>
          } @else {
            {{ step.value }}
          }
        </div>

        <span class="text-xs font-semibold uppercase tracking-wider transition-colors duration-300"
              [ngClass]="{
                'text-blue-400': $index === currentStepIndex,
                'text-slate-400': $index < currentStepIndex,
                'text-slate-600': $index > currentStepIndex
              }">
          {{ step.header }}
        </span>
      </div>

      @if (!isLast) {
        <div class="flex-grow h-[1px] mx-4 bg-white/5 relative overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-r from-blue-500 to-indigo-500 transition-all duration-500 origin-left"
               [style.transform]=" $index < currentStepIndex ? 'scaleX(1)' : 'scaleX(0)' "></div>
        </div>
      }
    }
  </div>

  <div class="glass-panel rounded-2xl p-6 flex flex-col min-h-48 transition-all duration-300">

    @if (stepsConfig() && stepsConfig()[currentStepIndex]) {
      <div class="flex-grow">
        <ng-container [ngTemplateOutlet]="stepsConfig()[currentStepIndex].template"></ng-container>
      </div>

      <div class="flex py-4 gap-3 border-t border-white/5 mt-6">

        @if (currentStepIndex > 0) {
          <button
            type="button"
            (click)="activateCallback(stepsConfig()[currentStepIndex].value)"
            class="px-4 py-2 text-xs font-semibold rounded-xl bg-white/5 border border-white/10 text-slate-300 hover:text-white hover:bg-white/10 transition-all cursor-pointer">
            Anterior
          </button>
        }
        <button
          type="button"
          (click)="activateCallback(stepsConfig()[currentStepIndex].value + 1)"
          [disabled]="stepsConfig()[currentStepIndex].isValid === false"
          class="px-5 py-2 text-xs font-bold rounded-xl bg-blue-500 text-white shadow-[0_4px_15px_rgba(59,130,246,0.25)] hover:bg-blue-600 disabled:opacity-30 disabled:cursor-not-allowed transition-all cursor-pointer font-mono ml-auto">
          {{ currentStepIndex === (stepsConfig().length - 1) ? 'FINALIZAR' : 'SIGUIENTE' }}
        </button>

      </div>
    } @else {
      <div class="flex-auto flex items-center justify-center text-xs text-slate-500 font-mono tracking-widest uppercase">
        Cargando_Componentes...
      </div>
    }

  </div>
</div>
