<div class="group/sidebar fixed top-0 left-0 h-screen w-6 z-50 flex items-center hover:w-28 transition-all duration-300 select-none">

  <nav
    class="pointer-events-auto flex flex-col items-center gap-5 p-4 w-16 bg-[#1a1a1e]/80 backdrop-blur-2xl border border-white/10 rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.6)] ml-4 transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] -translate-x-32 opacity-0 group-hover/sidebar:translate-x-0 group-hover/sidebar:opacity-100">

    <button
      type="button"
      [routerLink]="['/dashboard']"
      (click)="closeCallback($event)"
      class="w-10 h-10 flex items-center justify-center rounded-full bg-indigo-500 text-white shadow-[0_4px_14px_rgba(190,12,234,0.5)] hover:scale-110 active:scale-95 transition-all cursor-pointer shrink-0"
    >
      <i class="pi pi-th-large text-base text-white block"></i>
    </button>

    <div class="w-8 h-px bg-white/10 shrink-0"></div>

    <button
      type="button"
      [routerLink]="['/dashboard']"
      routerLinkActive="bg-white/10 text-white border border-white/20"
      (click)="closeCallback($event)"
      class="group/item relative w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all cursor-pointer shrink-0"
    >
      <i class="pi pi-credit-card text-lg text-slate-300 group-hover/item:text-white block"></i>
      <span class="absolute left-16 scale-0 group-hover/item:scale-100 bg-[#09090b] text-[11px] font-medium px-3 py-1.5 rounded-lg border border-white/10 text-slate-200 transition-all shadow-xl whitespace-nowrap z-50">
        Tablero de Tickets
      </span>
    </button>

    <button
      type="button"
      [routerLink]="usuarioLogueadoRol() === RolesEnum.Product_Owner ? ['/users'] : ['/profile']"
      routerLinkActive="bg-white/10 text-white border border-white/20"
      (click)="closeCallback($event)"
      class="group/item relative w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all cursor-pointer shrink-0"
    >
      @if (usuarioLogueadoRol() === RolesEnum.Product_Owner) {
        <i class="pi pi-users text-lg text-slate-300 group-hover/item:text-white block"></i>
        <span class="absolute left-16 scale-0 group-hover/item:scale-100 bg-[#09090b] text-[11px] font-medium px-3 py-1.5 rounded-lg border border-white/10 text-slate-200 transition-all shadow-xl whitespace-nowrap z-50">
          Gestión de Usuarios
        </span>
      } @else {
        <i class="pi pi-user text-lg text-slate-300 group-hover/item:text-white block"></i>
        <span class="absolute left-16 scale-0 group-hover/item:scale-100 bg-[#09090b] text-[11px] font-medium px-3 py-1.5 rounded-lg border border-white/10 text-slate-200 transition-all shadow-xl whitespace-nowrap z-50">
          Mi Perfil
        </span>
      }
    </button>

    <button
      type="button"
      class="group/item relative w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all cursor-pointer shrink-0"
    >
      <i class="pi pi-wallet text-lg text-slate-300 group-hover/item:text-white block"></i>
      <span class="absolute left-16 scale-0 group-hover/item:scale-100 bg-[#09090b] text-[11px] font-medium px-3 py-1.5 rounded-lg border border-white/10 text-slate-200 transition-all shadow-xl whitespace-nowrap z-50">
        Analíticas de Repos
      </span>
    </button>

    <button
      type="button"
      class="group/item relative w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all cursor-pointer shrink-0"
    >
      <i class="pi pi-list text-lg text-slate-300 group-hover/item:text-white block"></i>
      <span class="absolute left-16 scale-0 group-hover/item:scale-100 bg-[#09090b] text-[11px] font-medium px-3 py-1.5 rounded-lg border border-white/10 text-slate-200 transition-all shadow-xl whitespace-nowrap z-50">
        Reportes del Sistema
      </span>
    </button>

    <div class="w-8 h-px bg-white/10 shrink-0"></div>

    <button
      [routerLink]="['/profile']"
      type="button"
      class="group/item relative w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all cursor-pointer shrink-0"
    >
      <i class="pi pi-cog text-lg text-slate-300 group-hover/item:text-white block"></i>
      <span class="absolute left-16 scale-0 group-hover/item:scale-100 bg-[#09090b] text-[11px] font-medium px-3 py-1.5 rounded-lg border border-white/10 text-slate-200 transition-all shadow-xl whitespace-nowrap z-50">
        Configuración
      </span>
    </button>

    <button
      type="button"
      (click)="logout()"
      class="group/item relative w-10 h-10 flex items-center justify-center rounded-xl text-slate-500 hover:text-red-400 hover:bg-red-500/10 transition-all cursor-pointer shrink-0"
    >
      <i class="pi pi-sign-out text-lg text-slate-400 group-hover/item:text-red-400 block"></i>
      <span class="absolute left-16 scale-0 group-hover/item:scale-100 bg-[#09090b] text-[11px] font-medium px-3 py-1.5 rounded-lg border border-white/10 text-red-400 transition-all shadow-xl whitespace-nowrap z-50">
        Cerrar Sesión
      </span>
    </button>

  </nav>
</div>
