@if (visible()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 overflow-y-auto ">
    <div
      (click)="cerrarModal()"
      class="fixed inset-0 bg-[#060609]/80 backdrop-blur-sm transition-opacity duration-300">
    </div>

    <div
      class="animate-hud-modal crypto-glass-card w-full rounded-2xl border border-white/10 shadow-2xl relative z-10 overflow-hidden my-auto top-6"
      [ngClass]="sizeClass">

      <div class="px-5 py-4 border-b border-white/5 flex justify-between items-center bg-white/[0.01]">
        <h2 class="text-sm font-bold font-mono tracking-tight text-white flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_8px_#3b82f6]"></span>
          {{ title() }}
        </h2>
        <button (click)="cerrarModal()" class="text-slate-500 hover:text-white p-1 rounded-lg hover:bg-white/5 transition-colors cursor-pointer">
          <i class="pi pi-times text-xs"></i>
        </button>
      </div>

      <div class="relative">
        <ng-content></ng-content>
      </div>

    </div>
  </div>
}
