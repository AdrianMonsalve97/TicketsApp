<div class="fixed inset-0 -z-10 overflow-hidden bg-[#0A0A0A] pointer-events-none">

  @for (orb of orbs; track $index) {
    <div
      class="absolute rounded-full blur-[120px] animate-float opacity-60 mix-blend-screen {{ orb.color }}"
      [style.top]="orb.top"
      [style.left]="orb.left"
      [style.width]="orb.size"
      [style.height]="orb.size"
      [style.animation-duration]="orb.duration"
      [style.animation-delay]="orb.delay"
    ></div>
  }

  <svg class="absolute inset-0 w-full h-full opacity-[0.004] mix-blend-screen pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <defs>
      <pattern id="logoPattern" width="60" height="60" patternUnits="userSpaceOnUse">
        <image
          href="/1nt3rImg/ImagoBlanco.svg"
          x="10"
          y="10"
          width="40"
          height="40"
        />
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#logoPattern)"/>
  </svg>

  <div class="absolute -bottom-[-1%] -right-[-2%] w-[180px] h-[180px] opacity-[0.04] pointer-events-none mix-blend-screen">
    <img
      src="/1nt3rImg/ImagoBlanco.svg"
      alt="Watermark Logo"
      class="w-full h-full object-contain"
    />
  </div>

</div>
