<div class="min-h-screen bg-transparent text-slate-200 font-mono flex items-center justify-center p-4 relative overflow-hidden select-none">

  <div class="w-full max-w-md p-8 border border-white/5 bg-black/40 backdrop-blur-3xl rounded-3xl overflow-hidden shadow-[0_30px_100px_rgba(0,0,0,0.85)] z-10 animate-hud-modal">

    <div class="flex flex-col items-center text-center mb-8">
      <img src="/1nt3rImg/ImagoBlanco.svg" alt="Logo" class="h-12 w-auto mb-3" />
      <h2 class="text-xl font-bold text-slate-100 tracking-tight">
        Case<span class="text-blue-400">Track</span>
      </h2>
    </div>

    <form (ngSubmit)="ejecutarLogin()" class="space-y-5">

      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] text-slate-500 font-bold tracking-wider">NOMBRE DE USUARIO</label>
        <div class="relative flex items-center">
          <i class="pi pi-user absolute left-3.5 text-xs text-slate-500"></i>
          <input
            type="text"
            [(ngModel)]="credenciales.nombreUsuario"
            name="username"
            required
            placeholder="ej: aelsner_exec"
            class="w-full h-11 pl-10 pr-4 bg-black/60 border border-white/10 rounded-xl text-xs text-slate-200 font-mono focus:outline-none focus:border-blue-500/40 focus:bg-black/80 transition-all placeholder:text-slate-700"
          />
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] text-slate-500 font-bold tracking-wider">CONTRASEÑA</label>
        <div class="relative flex items-center">
          <i class="pi pi-lock absolute left-3.5 text-xs text-slate-500"></i>
          <input
            type="password"
            [(ngModel)]="credenciales.password"
            name="password"
            required
            placeholder="••••••••••••"
            class="w-full h-11 pl-10 pr-4 bg-black/60 border border-white/10 rounded-xl text-xs text-slate-200 font-mono focus:outline-none focus:border-blue-500/40 focus:bg-black/80 transition-all placeholder:text-slate-700"
          />
        </div>
      </div>

      @if (errorMessage) {
        <div class="text-[10px] text-rose-400 bg-rose-500/10 border border-rose-500/20 rounded-xl px-3 py-2">
          {{ errorMessage }}
        </div>
      }

      <div class="pt-2">
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full h-11 border border-blue-500/30 bg-blue-500/10 text-blue-400 hover:bg-blue-500/20 active:scale-[0.99] rounded-xl text-xs font-bold tracking-widest transition-all shadow-[0_4px_25px_rgba(59,130,246,0.05)] uppercase"
        >
         {{ isLoading ? 'Validando...' : 'Continuar' }}
        </button>
      </div>

    </form>

  </div>
</div>
