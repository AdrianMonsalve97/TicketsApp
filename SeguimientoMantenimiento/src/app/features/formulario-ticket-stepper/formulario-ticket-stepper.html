<div class="w-full">

  <app-dynamic-stepper
    [stepsConfig]="configuracionPasos"
    (onComplete)="completarRegistro()">
  </app-dynamic-stepper>

  <ng-template #pasoDefinicion>
    <form [formGroup]="formPasoUno" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-300">Título del Requerimiento</label>
        <input type="text" formControlName="titulo" placeholder="Ej: Error en pasarela de pagos..." class="w-full p-3 bg-black/40 border border-white/10 text-xs text-white rounded-xl focus:outline-none focus:border-blue-500/50 transition-colors" />
      </div>

      <div class="flex flex-col gap-1.5">
        <div class="flex justify-between items-center">
          <label class="text-xs font-semibold text-slate-300">Historia de Usuario Relacionada</label>
          <span class="text-[10px] font-mono text-slate-500 uppercase tracking-wider">Opcional // Backlog</span>
        </div>
        <input
          type="text"
          formControlName="historiaUsuario"
          placeholder="Ej: HU-8475 (Dejar vacío si no se ha priorizado)"
          class="w-full p-3 bg-black/40 border border-white/10 text-xs text-white rounded-xl focus:outline-none focus:border-blue-500/50 transition-colors placeholder:text-slate-600" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-300">Descripción Técnica</label>
        <textarea formControlName="descripcion" rows="3" placeholder="Detalles del comportamiento esperado..." class="w-full p-3 bg-black/40 border border-white/10 text-xs text-white rounded-xl focus:outline-none focus:border-blue-500/50 transition-colors resize-none"></textarea>
      </div>
    </form>
  </ng-template>

  <ng-template #pasoInfraestructura>
    <form [formGroup]="formPasoDos" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-300">Ruta de Carpeta de Evidencias (Medios)</label>
        <input type="text" formControlName="carpetaMedios" placeholder="Ej: /medios/tickets/tck1001" class="w-full p-3 bg-black/40 border border-white/10 text-xs text-white rounded-xl focus:outline-none focus:border-blue-500/50 transition-colors" />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-300">Repositorio Core Afectado</label>
        <select formControlName="repositorioId" class="w-full p-3 bg-black/40 border border-white/10 text-xs text-slate-300 rounded-xl focus:outline-none focus:border-blue-500/50 transition-colors cursor-pointer">
          <option value="" class="bg-[#0d0d12] text-slate-500">Selecciona el repositorio afectado</option>
          <option value="DOTNET_Servicios" class="bg-[#0d0d12]">DOTNET_Servicios_Liquidacion (API)</option>
          <option value="ANGULAR_Core" class="bg-[#0d0d12]">ANGULAR_LIQUIDACION (Frontend)</option>
          <option value="Android_App" class="bg-[#0d0d12]">Android_ControlleAPP (Mobile)</option>
        </select>
      </div>
    </form>
  </ng-template>

  <ng-template #pasoAsignacion>
    <form [formGroup]="formPasoTres" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-300">Estado Inicial</label>
        <select formControlName="estadoActual" class="w-full p-3 bg-black/40 border border-white/10 text-xs text-slate-300 rounded-xl focus:outline-none focus:border-blue-500/50 transition-colors cursor-pointer">
          @for (estado of listaEstados; track estado) {
            <option [value]="estado" class="bg-[#0d0d12] text-slate-300">{{ estado }}</option>
          }
        </select>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-300">Desarrollador</label>
          <select formControlName="desarrolladorAsignadoId" class="w-full p-3 bg-black/40 border border-white/10 text-xs text-slate-300 rounded-xl focus:outline-none cursor-pointer">
            <option value="" class="bg-[#0d0d12]">Seleccionar</option>
            <option value="DEV-Hamilton" class="bg-[#0d0d12]">DEV-Hamilton</option>
            <option value="DEV-Brayan" class="bg-[#0d0d12]">DEV-Brayan</option>
            <option value="DEV-Miguel" class="bg-[#0d0d12]">DEV-Miguel</option>
          </select>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-300">Analista QA</label>
          <select formControlName="qaAsignadoId" class="w-full p-3 bg-black/40 border border-white/10 text-xs text-slate-300 rounded-xl focus:outline-none cursor-pointer">
            <option value="" class="bg-[#0d0d12]">Seleccionar</option>
            <option value="QA-Laura" class="bg-[#0d0d12]">QA-Laura</option>
            <option value="QA-Santiago" class="bg-[#0d0d12]">QA-Santiago</option>
          </select>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-slate-300">Líder Técnico (LT)</label>
          <select formControlName="ltAsignadoId" class="w-full p-3 bg-black/40 border border-white/10 text-xs text-slate-300 rounded-xl focus:outline-none cursor-pointer">
            <option value="" class="bg-[#0d0d12]">Seleccionar</option>
            <option value="LT-Edward" class="bg-[#0d0d12]">LT-Edward</option>
          </select>
        </div>
      </div>
    </form>
  </ng-template>

  <ng-template #pasoSoporte>
    <form [formGroup]="formPasoCuatro" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-300">Causa Raíz Diagnosticada</label>
        <textarea formControlName="causaRaiz" rows="2" placeholder="Describa el origen técnico de la falla o solicitud..." class="w-full p-3 bg-black/40 border border-white/10 text-xs text-white rounded-xl focus:outline-none focus:border-blue-500/50 transition-colors resize-none"></textarea>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-slate-300">Solución Propuesta</label>
        <textarea formControlName="solucionPropuesta" rows="2" placeholder="Estrategia de mitigación y refactorización de código..." class="w-full p-3 bg-black/40 border border-white/10 text-xs text-white rounded-xl focus:outline-none focus:border-blue-500/50 transition-colors resize-none"></textarea>
      </div>
    </form>
  </ng-template>

</div>
