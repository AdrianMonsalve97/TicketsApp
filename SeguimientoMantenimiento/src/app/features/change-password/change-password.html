<div class="min-h-screen flex items-center justify-center p-6 bg-transparent text-slate-200">
  <div class="w-full max-w-md bg-black/40 border border-white/5 backdrop-blur-3xl rounded-3xl p-8 shadow-[0_30px_100px_rgba(0,0,0,0.85)]">
    <h1 class="text-xl font-bold text-white mb-2">Cambiar contraseña</h1>
    <p class="text-xs text-slate-400 mb-6">Es tu primer ingreso o necesitas actualizar tus credenciales.</p>

    <div class="space-y-4">
      <div>
        <label class="text-[10px] text-slate-500 font-bold tracking-wider">CONTRASEÑA ACTUAL</label>
        <input [(ngModel)]="form.actual" type="password" class="mt-1 w-full h-11 px-4 rounded-xl bg-black/60 border border-white/10 text-xs text-slate-200 focus:outline-none focus:border-blue-500/40" />
      </div>
      <div>
        <label class="text-[10px] text-slate-500 font-bold tracking-wider">NUEVA CONTRASEÑA</label>
        <input [(ngModel)]="form.nueva" type="password" class="mt-1 w-full h-11 px-4 rounded-xl bg-black/60 border border-white/10 text-xs text-slate-200 focus:outline-none focus:border-blue-500/40" />
      </div>
      <div>
        <label class="text-[10px] text-slate-500 font-bold tracking-wider">CONFIRMAR CONTRASEÑA</label>
        <input [(ngModel)]="form.confirmar" type="password" class="mt-1 w-full h-11 px-4 rounded-xl bg-black/60 border border-white/10 text-xs text-slate-200 focus:outline-none focus:border-blue-500/40" />
      </div>

      @if (errorMessage) {
        <div class="text-[10px] text-rose-400 bg-rose-500/10 border border-rose-500/20 rounded-xl px-3 py-2">{{ errorMessage }}</div>
      }
      @if (successMessage) {
        <div class="text-[10px] text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 rounded-xl px-3 py-2">{{ successMessage }}</div>
      }

      <button (click)="cambiar()" [disabled]="isLoading" class="w-full h-11 rounded-xl bg-blue-500/10 text-blue-400 border border-blue-500/30 font-bold text-xs tracking-widest uppercase">
        {{ isLoading ? 'Guardando...' : 'Actualizar' }}
      </button>
    </div>
  </div>
</div>
