<div class="w-full fixed top-4 left-0 flex justify-center z-50 pointer-events-none mb-4 mt-1">
  <header class="pointer-events-auto flex items-center justify-between px-4 h-14 w-[90%] max-w-[1100px] bg-white/[0.03] backdrop-blur-xl border border-white/10 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.5)] transition-all duration-500 hover:scale-[1.01]">

    <div class="flex items-center gap-2 cursor-pointer group">
      <img src="/1nt3rImg/ImagoBlanco.svg" alt="CaseTrack Logo" class="h-6 w-auto object-contain transition-transform duration-500 group-hover:rotate-[360deg]" />
      <span class="text-sm font-bold text-slate-100 tracking-tight hidden sm:inline font-mono">
        Case<span class="text-blue-400">Track</span>
      </span>
    </div>

    <div class="flex items-center gap-4">
      <div class="h-4 w-px bg-white/10"></div>

      <div class="cursor-pointer flex items-center transition-transform active:scale-95" (click)="alternarPopover($event)">        <p-overlaybadge value="2" styleClass="sin-borde" class="mt-2">
          <p-avatar image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png" size="large" shape="circle" class="top-2 border border-white/10" />
        </p-overlaybadge>
      </div>

      <p-popover #op styleClass="popover-hud-cyberpunk">
        <div class="w-76 p-4 text-slate-200 font-mono select-none">

          <div class="flex items-center justify-between border-b border-white/10 pb-2.5 mb-2.5">
            <span class="text-md font-bold text-blue-400 tracking-widest">NOTIFICACIONES</span>

          </div>

          <ul class="flex flex-col gap-2.5">
            <li class="p-2.5 bg-black/20 border border-white/5 hover:border-blue-500/30 hover:bg-white/[0.04] rounded-xl transition-all cursor-pointer group/item">
              <div class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-blue-400 group-hover/item:animate-ping"></span>
                <p class="font-bold text-slate-100 text-xs tracking-tight">Nuevo caso asignado</p>
              </div>
              <p class="text-slate-500 text-[10px] font-mono mt-1 pl-3"><i class="pi pi-clock text-[9px]"></i> T-5min SYS</p>
            </li>

            <li class="p-2.5 bg-black/20 border border-white/5 hover:border-amber-500/30 hover:bg-white/[0.04] rounded-xl transition-all cursor-pointer group/item">
              <div class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
                <p class="font-bold text-slate-100 text-xs tracking-tight">Cambio de estado en #4829</p>
              </div>
              <p class="text-slate-500 text-[10px] font-mono mt-1 pl-3"><i class="pi pi-clock text-[9px]"></i> T-1hr ALM</p>
            </li>
          </ul>

        </div>
      </p-popover>
    </div>

  </header>
</div>
