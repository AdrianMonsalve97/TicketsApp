<div class="w-full fixed top-4 left-0 flex justify-center z-50 pointer-events-none mb-4 mt-1">
  <header class="pointer-events-auto flex items-center justify-between px-4 h-14 w-[90%] max-w-[1100px] bg-white/[0.03] backdrop-blur-xl border border-white/10 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.5)] transition-all duration-500 hover:scale-[1.01]">

    <div class="flex items-center gap-2 cursor-pointer group">
      <img src="/1nt3rImg/ImagoBlanco.svg" alt="CaseTrack Logo" class="h-6 w-auto object-contain transition-transform duration-500 group-hover:rotate-[360deg]" />
      <span class="text-sm font-bold text-slate-100 tracking-tight hidden sm:inline font-mono">
        Case<span class="text-blue-400">Track</span>
      </span>
    </div>

    <div class="flex items-center gap-4">
      <div class="h-4 w-px bg-white/10"></div>

      <button
        type="button"
        (click)="logout()"
        class="group relative flex items-center gap-2 px-3 py-2 rounded-full bg-white/[0.04] border border-white/10 text-slate-200 hover:text-white hover:bg-red-500/10 hover:border-red-500/30 transition-all pointer-events-auto cursor-pointer"
      >
        <i class="pi pi-sign-out text-xs group-hover:text-red-300"></i>
        <span class="text-[10px] font-mono tracking-widest uppercase">Logout</span>
      </button>

      <div class="cursor-pointer flex items-center transition-transform active:scale-95" (click)="alternarPopover($event)">
        <p-overlaybadge [value]="cantidadNotificaciones()" styleClass="sin-borde" class="mt-2">
          <p-avatar image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png" size="large" shape="circle" class="top-2 border border-white/10" />
        </p-overlaybadge>
      </div>

      <p-popover #op styleClass="popover-hud-cyberpunk">
        <div class="w-76 p-4 text-slate-200 font-mono select-none">

          <div class="flex items-center justify-between border-b border-white/10 pb-2.5 mb-2.5">
            <span class="text-md font-bold text-blue-400 tracking-widest">NOTIFICACIONES</span>
          </div>

          <ul class="flex flex-col gap-2.5 max-h-72 overflow-y-auto pr-1">
            @if (notificaciones().length) {
              @for (notif of notificaciones(); track notif.detail + notif.time) {
                <li
                  class="p-2.5 bg-black/20 border rounded-xl transition-all cursor-pointer group/item hover:bg-white/[0.04]"
                  [ngClass]="notif.tone === 'info' ? 'border-blue-500/30 hover:border-blue-500/30' : 'border-amber-500/30 hover:border-amber-500/30'"
                >
                  <div class="flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full" [class.bg-blue-400]="notif.tone === 'info'" [class.bg-amber-400]="notif.tone === 'warning'"></span>
                    <p class="font-bold text-slate-100 text-xs tracking-tight">{{ notif.title }}</p>
                  </div>
                  <p class="text-slate-300 text-[10px] mt-1 pl-3">{{ notif.detail }}</p>
                  <p class="text-slate-500 text-[10px] font-mono mt-1 pl-3">
                    <i class="pi pi-clock text-[9px]"></i> {{ notif.time }} · {{ notif.meta }}
                  </p>
                </li>
              }
            } @else {
              <li class="p-3 text-[10px] text-slate-500 border border-white/5 rounded-xl bg-black/10">
                Sin notificaciones nuevas.
              </li>
            }
          </ul>

        </div>
      </p-popover>
    </div>

  </header>
</div>
